# -----------------------------
# Valeurs globales pour l'environnement dev
# -----------------------------
global:
  namespace: dev
  imagePullPolicy: IfNotPresent
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"

# -----------------------------
# Sous-charts activés et configurés pour dev
# -----------------------------
database:
  enabled: true
  image:
    repository: "ghcr.io/mairie360/database"
    tag: "main-18242192009"
  env:
    POSTGRES_USER: "postgres"
    POSTGRES_PASSWORD: "dev_pass"
    POSTGRES_DB: "core_dev"
  persistence:
    enabled: true
    size: "1Gi"

