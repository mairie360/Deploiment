apiVersion: v1
kind: Secret
metadata:
  name: {{ include "database.fullname" . }}-secret
type: Opaque
stringData:
  POSTGRES_USER: {{ .Values.env.POSTGRES_USER | default "postgres" | quote }}
  POSTGRES_PASSWORD: {{ .Values.env.POSTGRES_PASSWORD | default "changeme" | quote }}
  POSTGRES_DB: {{ .Values.env.POSTGRES_DB | default "postgres" | quote }}
