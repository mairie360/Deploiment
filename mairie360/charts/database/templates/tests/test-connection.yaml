apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "database.fullname" . }}-test"
  labels:
    app: "{{ include "database.name" . }}"
    helm.sh/chart: "{{ include "database.chart" . }}"
    app.kubernetes.io/managed-by: "{{ .Release.Service }}"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: psql-test
      image: postgres:17
      env:
        - name: PGUSER
          valueFrom:
            secretKeyRef:
              name: {{ include "database.fullname" . }}-secret
              key: POSTGRES_USER
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ include "database.fullname" . }}-secret
              key: POSTGRES_PASSWORD
        - name: PGDATABASE
          valueFrom:
            secretKeyRef:
              name: {{ include "database.fullname" . }}-secret
              key: POSTGRES_DB
      command:
        - sh
        - -c
        - |
          echo "🔍 Starting PostgreSQL connection test..."
          echo "Using host: {{ include "database.fullname" . }}"
          COUNT=0
          until pg_isready -h {{ include "database.fullname" . }} -p 5432 > /dev/null 2>&1; do
            COUNT=$((COUNT+1))
            echo "⏳ Waiting for PostgreSQL to be ready... ($COUNT)"
            sleep 2
            if [ $COUNT -gt 30 ]; then
              echo "❌ PostgreSQL did not become ready in time!"
              exit 1
            fi
          done
          echo "✅ PostgreSQL is reachable!"
