apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-and-internal
  namespace: {{ .Release.Namespace }}
spec:
  podSelector: {} # S'applique à TOUS les pods du namespace
  policyTypes:
  - Ingress
  ingress:
    - from:
      - podSelector: {} # Autorise tous les pods du namespace
      - namespaceSelector: {} # Autorise TOUS les namespaces (y compris celui d'ingress-nginx)