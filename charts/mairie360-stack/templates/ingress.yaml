# --- 1. Ingress pour les APIs (Avec réécriture) ---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "mairie360.fullname" . }}-api
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: "nginx"
  tls:
    - hosts:
      {{- range $frontName, $frontConfig := .Values.Fronts.instances }}
      {{- if $frontConfig.enabled }}
      - {{ printf "%s.%s" ($frontName | replace "-front" "") $.Values.global.domain | quote }}
      {{- end }}
      {{- end }}
      secretName: {{ printf "%s-tls-secret" (include "mairie360.fullname" .) }}
  rules:
    {{- range $frontName, $frontConfig := .Values.Fronts.instances }}
    {{- if $frontConfig.enabled }}
    - host: {{ printf "%s.%s" ($frontName | replace "-front" "") $.Values.global.domain | quote }}
      http:
        paths:
          - path: /api(/)(auth.*|user.*|session.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ printf "%s-user-bff" $.Release.Name }}
                port: { number: 4000 }
          {{- range $bffName, $bffConfig := $.Values.BFFs.instances }}
          {{- $frontBase := ($frontName | replace "-front" "") }}
          {{- if and $bffConfig.enabled (contains $frontBase $bffName) }}
          - path: /api(/)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ printf "%s-%s" $.Release.Name $bffName }}
                port: { number: {{ $bffConfig.port | default 4000 }} }
          {{- end }}
          {{- end }}
    {{- end }}
    {{- end }}

---

# --- 2. Ingress pour les Frontends (Sans réécriture, correction du 404) ---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "mairie360.fullname" . }}-fronts
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: "nginx"
  tls:
    - hosts:
      {{- range $frontName, $frontConfig := .Values.Fronts.instances }}
      {{- if $frontConfig.enabled }}
      - {{ printf "%s.%s" ($frontName | replace "-front" "") $.Values.global.domain | quote }}
      {{- end }}
      {{- end }}
      secretName: {{ printf "%s-tls-secret" (include "mairie360.fullname" .) }}
  rules:
    {{- range $frontName, $frontConfig := .Values.Fronts.instances }}
    {{- if $frontConfig.enabled }}
    - host: {{ printf "%s.%s" ($frontName | replace "-front" "") $.Values.global.domain | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                # Nom du service correspondant au front (ex: local-dev-login-front)
                name: {{ printf "%s-%s" $.Release.Name ($frontName | lower) }}
                port: { number: 80 }
    {{- end }}
    {{- end }}
