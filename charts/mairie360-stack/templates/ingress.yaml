# 1. Ingress Frontend (Gère tout le trafic sauf /api)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "mairie360.fullname" . }}-frontend
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-local"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: "nginx"
  tls:
    - hosts:
      {{- range $frontName, $frontConfig := .Values.Fronts.instances }}
      {{- if $frontConfig.enabled }}
      - {{ printf "%s.%s" ($frontName | replace "-front" "") $.Values.global.domain | quote }}
      {{- end }}
      {{- end }}
      secretName: {{ printf "%s-tls-secret" (include "mairie360.fullname" .) }}
  rules:
    {{- range $frontName, $frontConfig := .Values.Fronts.instances }}
    {{- if $frontConfig.enabled }}
    - host: {{ printf "%s.%s" ($frontName | replace "-front" "") $.Values.global.domain | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ printf "%s-%s" $.Release.Name ($frontName | lower) }}
                port: { number: 80 }
    {{- end }}
    {{- end }}

---

# 2. Ingress API (Gère uniquement /api avec réécriture)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "mairie360.fullname" . }}-api
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$3
spec:
  ingressClassName: "nginx"
  tls:
    - hosts:
      {{- range $frontName, $frontConfig := .Values.Fronts.instances }}
      {{- if $frontConfig.enabled }}
      - {{ printf "%s.%s" ($frontName | replace "-front" "") $.Values.global.domain | quote }}
      {{- end }}
      {{- end }}
      secretName: {{ printf "%s-tls-secret" (include "mairie360.fullname" .) }}
  rules:
    {{- range $frontName, $frontConfig := .Values.Fronts.instances }}
    {{- if $frontConfig.enabled }}
    - host: {{ printf "%s.%s" ($frontName | replace "-front" "") $.Values.global.domain | quote }}
      http:
        paths:
          # --- PRIORITÉ HAUTE : Routes partagées vers user-bff ---
          - path: /api/(auth|user|session)(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ printf "%s-user-bff" $.Release.Name }}
                port: { number: 4000 }

          # --- PRIORITÉ BASSE : Routes spécifiques vers les autres BFF ---
          {{- range $bffName, $bffConfig := $.Values.BFFs.instances }}
          {{- $frontBase := ($frontName | replace "-front" "") }}
          {{- if and $bffConfig.enabled (contains $frontBase $bffName) }}
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ printf "%s-%s" $.Release.Name $bffName }}
                port: { number: {{ $bffConfig.port | default 4000 }} }
          {{- end }}
          {{- end }}
    {{- end }}
    {{- end }}
