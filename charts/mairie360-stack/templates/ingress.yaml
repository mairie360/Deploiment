{{- $ingress := .Values.ingress | default dict -}}
{{- if and .Values.ingress .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "mairie360.fullname" . }}
  labels:
    {{- include "mairie360.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/ingress.class: {{ $ingress.className | default "nginx" | quote }}
    cert-manager.io/cluster-issuer: {{ $ingress.clusterIssuer | default "letsencrypt-prod" | quote }}
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    {{- with $ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ $ingress.className | default "nginx" }}
  tls:
    - hosts:
        {{- /* 1. Routes manuelles */}}
        {{- range $ingress.hosts }}
        - {{ .host | quote }}
        {{- end }}
        {{- /* 2. Hôtes pour chaque FRONT activé */}}
        {{- range $frontName, $frontConfig := .Values.Fronts.instances }}
        {{- if $frontConfig.enabled }}
        - {{ printf "%s.%s" ($frontName | replace "-front" "") $.Values.global.domain | quote }}
        {{- end }}
        {{- end }}
      secretName: {{ printf "%s-tls-secret" (include "mairie360.fullname" .) }}
  rules:
    {{- /* ROUTE MANUELLE */}}
    {{- range $ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType | default "Prefix" }}
            backend:
              service:
                name: {{ .serviceName }}
                port:
                  number: {{ .servicePort | default 80 }}
          {{- end }}
    {{- end }}

    {{- /* ROUTES AUTOMATIQUES POUR LES FRONTS ET LEURS API/BFF */}}
    {{- range $frontName, $frontConfig := .Values.Fronts.instances }}
    {{- if $frontConfig.enabled }}
    - host: {{ printf "%s.%s" ($frontName | replace "-front" "") $.Values.global.domain | quote }}
      http:
        paths:
          {{- /* Route Front */}}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ printf "%s-%s" $.Release.Name ($frontName | lower) }}
                port:
                  number: 80
          {{- /* Route API/BFF automatique */}}
          {{- range $bffName, $bffConfig := $.Values.BFFs.instances }}
          {{- if and $bffConfig.enabled (contains ($frontName | replace "-front" "") $bffName) }}
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ printf "%s-%s" $.Release.Name $bffName }}
                port:
                  number: {{ $bffConfig.port | default 4000 }}
          {{- end }}
          {{- end }}
    {{- end }}
    {{- end }}
{{- end }}
