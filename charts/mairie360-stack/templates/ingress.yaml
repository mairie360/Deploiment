{{- $ingress := .Values.ingress | default dict -}}
{{- if and .Values.ingress .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "mairie360.fullname" . }}
  labels:
    {{- include "mairie360.labels" . | nindent 4 }}
  annotations:
    {{- with $ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if $ingress.className }}
    kubernetes.io/ingress.class: {{ $ingress.className | quote }}
    {{- end }}
    {{- if $ingress.clusterIssuer }}
    cert-manager.io/cluster-issuer: {{ $ingress.clusterIssuer | quote }}
    {{- end }}
spec:
  {{- if $ingress.className }}
  ingressClassName: {{ $ingress.className }}
  {{- end }}
  {{- if $ingress.tls }}
  tls:
    {{- range $ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range $ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType | default "Prefix" }}
            backend:
              service:
                name: {{ .serviceName | default (printf "%s-gateway" (include "mairie360.fullname" $)) }}
                port:
                  number: {{ .servicePort | default 80 }}
          {{- end }}
    {{- end }}
{{- end }}