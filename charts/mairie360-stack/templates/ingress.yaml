{{- $ingress := .Values.ingress | default dict -}}
{{- if and .Values.ingress .Values.ingress.enabled -}}

# 1. INGRESS FRONTEND (Sans réécriture)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "mairie360.fullname" . }}-frontend
  labels: {{- include "mairie360.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/ingress.class: {{ $ingress.className | default "nginx" | quote }}
    cert-manager.io/cluster-issuer: {{ $ingress.clusterIssuer | default "letsencrypt-prod" | quote }}
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    {{- with $ingress.annotations }} {{- toYaml . | nindent 4 }} {{- end }}
spec:
  ingressClassName: {{ $ingress.className | default "nginx" }}
  tls:
    - hosts:
        {{- range $ingress.hosts }} - {{ .host | quote }} {{- end }}
        {{- range $frontName, $frontConfig := .Values.Fronts.instances }}
        {{- if $frontConfig.enabled }} - {{ printf "%s.%s" ($frontName | replace "-front" "") $.Values.global.domain | quote }} {{- end }}
        {{- end }}
      secretName: {{ printf "%s-tls-secret" (include "mairie360.fullname" .) }}
  rules:
    {{- /* Routes Frontend */}}
    {{- range $frontName, $frontConfig := .Values.Fronts.instances }}
    {{- if $frontConfig.enabled }}
    - host: {{ printf "%s.%s" ($frontName | replace "-front" "") $.Values.global.domain | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ printf "%s-%s" $.Release.Name ($frontName | lower) }}
                port: { number: 80 }
    {{- end }}
    {{- end }}

---

# 2. INGRESS API (Avec réécriture)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "mairie360.fullname" . }}-api
  labels: {{- include "mairie360.labels" . | nindent 4 }}
  annotations:
    kubernetes.io/ingress.class: {{ $ingress.className | default "nginx" | quote }}
    cert-manager.io/cluster-issuer: {{ $ingress.clusterIssuer | default "letsencrypt-prod" | quote }}
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: {{ $ingress.className | default "nginx" }}
  tls:
    - hosts:
        {{- range $frontName, $frontConfig := .Values.Fronts.instances }}
        {{- if $frontConfig.enabled }} - {{ printf "%s.%s" ($frontName | replace "-front" "") $.Values.global.domain | quote }} {{- end }}
        {{- end }}
      secretName: {{ printf "%s-tls-secret" (include "mairie360.fullname" .) }}
  rules:
    {{- range $frontName, $frontConfig := .Values.Fronts.instances }}
    {{- if $frontConfig.enabled }}
    - host: {{ printf "%s.%s" ($frontName | replace "-front" "") $.Values.global.domain | quote }}
      http:
        paths:
          {{- range $bffName, $bffConfig := $.Values.BFFs.instances }}
          {{- $frontBase := ($frontName | replace "-front" "") }}
          {{- if and $bffConfig.enabled (or (and (or (eq $frontBase "login") (eq $frontBase "admin")) (eq $bffName "user-bff")) (contains $frontBase $bffName)) }}
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ printf "%s-%s" $.Release.Name $bffName }}
                port: { number: {{ $bffConfig.port | default 4000 }} }
          {{- end }}
          {{- end }}
    {{- end }}
    {{- end }}
{{- end }}
