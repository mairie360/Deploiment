apiVersion: v1
kind: Service
metadata:
  name: {{ include "mairie360.fullname" . }}-gateway
  labels:
    app: {{ include "mairie360.fullname" . }}
spec:
  {{- if .Values.service }}
  type: {{ .Values.service.type | default "LoadBalancer" }}
  {{- else }}
  type: LoadBalancer
  {{- end }}
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: {{ include "mairie360.fullname" . }}-backend