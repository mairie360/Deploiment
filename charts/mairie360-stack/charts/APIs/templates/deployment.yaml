{{- range $apiName, $apiConfig := .Values.instances }}
{{- if $apiConfig.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $.Release.Name }}-{{ $apiName }}
  labels:
    app: {{ $apiName }}
    component: api
spec:
  replicas: {{ $apiConfig.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: {{ $apiName }}
  template:
    metadata:
      labels:
        app: {{ $apiName }}
        component: api
    spec:
      {{/* Init Container pour attendre la DB */}}
      initContainers:
        - name: wait-for-db
          image: busybox:1.28
          command: ['sh', '-c', "until nc -zv {{ $.Release.Name }}-database 5432; do echo 'Waiting for database...'; sleep 2; done;"]
      containers:
        - name: {{ $apiName }}
          image: "{{ $apiConfig.image.repository }}:{{ $apiConfig.image.tag | default "latest" }}"
          ports:
            - containerPort: 3000
          {{/* Probes Kubernetes (remplace le healthcheck Docker) */}}
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
          env:
            {{- include "apis.commonEnv" $ | nindent 12 }}
            {{- if $apiConfig.env }}
            {{- toYaml $apiConfig.env | nindent 12 }}
            {{- end }}
{{- end }}
{{- end }}