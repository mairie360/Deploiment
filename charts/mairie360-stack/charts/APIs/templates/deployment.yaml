{{- range $apiName, $apiConfig := .Values.instances }}
{{- if $apiConfig.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $.Release.Name }}-{{ $apiName }}
  labels:
    app: {{ $apiName }}
    component: api
spec:
  replicas: {{ $apiConfig.replicaCount | default 1 }}
  # Stratégie pour éviter le blocage de RAM sur petit VPS
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: {{ $apiName }}
  template:
    metadata:
      labels:
        app: {{ $apiName }}
        component: api
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      # Suppression de l'initContainer wait-for-db pour accélérer le boot
      containers:
        - name: {{ $apiName }}
          image: "{{ $apiConfig.image.repository }}:{{ $apiConfig.image.tag | default "latest" }}"
          ports:
            - containerPort: 3000
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            {{- include "apis.commonEnv" $ | nindent 12 }}
            {{- if $apiConfig.env }}
            {{- toYaml $apiConfig.env | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml $.Values.resources | nindent 12 }}
{{- end }}
{{- end }}