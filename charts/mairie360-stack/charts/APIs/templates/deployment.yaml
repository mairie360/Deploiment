{{- range $apiName, $apiConfig := .Values.instances }}
{{- if $apiConfig.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $.Release.Name }}-{{ $apiName }}
  labels:
    app: {{ $apiName }}
    component: api
spec:
  replicas: {{ $apiConfig.replicaCount | default 1 }}
  # Stratégie pour éviter le blocage de RAM sur petit VPS
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: {{ $apiName }}
  template:
    metadata:
      labels:
        app: {{ $apiName }}
        component: api
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      # Suppression de l'initContainer wait-for-db pour accélérer le boot
      containers:
        - name: {{ $apiName }}
          image: "{{ $apiConfig.image.repository }}:{{ $apiConfig.image.tag | default "latest" }}"
          ports:
            - containerPort: 3000
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          env:
            # 1. Variables système et Redis
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "3000"
            - name: TOKIO_WORKER_THREADS
              value: "2"
            - name: REDIS_HOST
              value: {{ printf "%s-redis" $.Release.Name | quote }}
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_URL
              value: {{ printf "redis://%s-redis:6379" $.Release.Name | quote }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ printf "%s-redis" $.Release.Name }}
                  key: redis-password

            # 2. Variables de Base de données (sécurisées via le Secret global)
            - name: DB_TYPE
              value: "postgres"
            - name: DB_HOST
              value: {{ printf "%s-database" $.Release.Name | quote }}
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.global.database.secretName }}
                  key: POSTGRES_DB
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.global.database.secretName }}
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.global.database.secretName }}
                  key: POSTGRES_PASSWORD

            # 3. Variables dynamiques du values.yaml (JWT_SECRET, JWT_TIMEOUT...)
            {{- if $apiConfig.env }}
            {{- toYaml $apiConfig.env | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml $.Values.resources | nindent 12 }}
{{- end }}
{{- end }}
