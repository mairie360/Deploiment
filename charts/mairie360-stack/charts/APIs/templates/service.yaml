{{- range $apiName, $apiConfig := .Values.instances }}
{{- if $apiConfig.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $.Release.Name }}-{{ $apiName }}
  labels:
    app: {{ $apiName }}
    component: api
spec:
  type: ClusterIP
  ports:
    - port: {{ if eq $apiName "core-api" }}3000{{ else if eq $apiName "project-api" }}3001{{ else if eq $apiName "calendar-api" }}3002{{ else if eq $apiName "message-api" }}3003{{ else if eq $apiName "email-api" }}3004{{ else if eq $apiName "files-api" }}3005{{ else if eq $apiName "elearning-api" }}3006{{ else }}3000{{ end }}
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: {{ $apiName }}
{{- end }}
{{- end }}