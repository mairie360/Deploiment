apiVersion: apps/v1
kind: StatefulSet # Recommended for databases to ensure stable network IDs and persistent storage binding
metadata:
  name: {{ include "database.fullname" . }}
  labels:
    app: {{ include "database.name" . }}
spec:
  # serviceName is required for StatefulSets to manage the DNS identity of the pods
  serviceName: {{ include "database.fullname" . }}
  replicas: 1 # Single node for solo cluster setup
  selector:
    matchLabels:
      app: {{ include "database.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "database.name" . }}
    spec:
      # fsGroup ensures that the mounted volume is owned by the group 999 (postgres)
      securityContext:
        fsGroup: 999
      initContainers:
        # 1. On change le chemin de l'initContainer
        - name: init-permissions
          image: busybox
          command: ["sh", "-c", "chown -R 999:999 /var/lib/postgresql"]
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql
      containers:
        - name: database
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          args:
            - "-c"
            - "max_connections=200"
            - "-c"
            - "shared_buffers=128MB"
          securityContext:
            runAsUser: 999
            runAsGroup: 999
          ports:
            - containerPort: 5432
          # Readiness probe ensures the DB is ready to accept connections before other services (like Liquibase) try to connect
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)", "-d", "$(POSTGRES_DB)"]
            initialDelaySeconds: 5
            periodSeconds: 10
          # Liveness probe restarts the container if the database process hangs
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)", "-d", "$(POSTGRES_DB)"]
            initialDelaySeconds: 15
            periodSeconds: 20
          env:
            - name: POSTGRES_USER
              value: {{ .Values.env.POSTGRES_USER | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.env.POSTGRES_PASSWORD | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.env.POSTGRES_DB | quote }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql
              subPath: postgres-data
      imagePullSecrets:
        - name: ghcr-secret

  # volumeClaimTemplates automatically creates a PersistentVolumeClaim for each pod in the StatefulSet
  volumeClaimTemplates:
    - metadata:
        name: data # This name must match the volumeMounts name in the container
      spec:
        accessModes:
          - {{ .Values.persistence.accessMode | default "ReadWriteOnce" }}
        storageClassName: {{ .Values.persistence.storageClass | default "standard" }}
        resources:
          requests:
            storage: {{ .Values.persistence.size | default "1Gi" }}
