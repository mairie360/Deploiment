apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "database.fullname" . }}-api-only
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: database # Cible les pods de la DB
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          component: api # Autorise uniquement ce qui a le label "api"
    ports:
    - protocol: TCP
      port: 5432