{{- range $bffName, $bffConfig := .Values.instances }}
{{- if $bffConfig.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $.Release.Name }}-{{ $bffName }}
  labels:
    app: {{ $bffName }}
    component: bff
spec:
  replicas: {{ $bffConfig.replicaCount | default 1 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: {{ $bffName }}
  template:
    metadata:
      labels:
        app: {{ $bffName }}
        component: bff
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      # Suppression de l'initContainer wait-for-dependencies pour éviter le deadlock
      containers:
        - name: {{ $bffName }}
          image: "{{ $bffConfig.image.repository }}:{{ $bffConfig.image.tag | default "latest" }}"
          ports:
            - containerPort: 4000
          env:
            {{- include "bffs.commonEnv" $ | nindent 12 }}
            {{- if $bffConfig.env }}
            {{- toYaml $bffConfig.env | nindent 12 }}
            {{- end }}
          # Ajout de la LivenessProbe pour surveiller Node.js
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 20
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            limits:
              memory: "512Mi"
            requests:
              memory: "128Mi" # Augmenté pour éviter le Pending/OOM initial
              cpu: "20m"
{{- end }}
{{- end }}