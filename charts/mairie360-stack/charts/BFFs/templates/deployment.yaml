{{- range $bffName, $bffConfig := .Values.instances }}
{{- if $bffConfig.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $.Release.Name }}-{{ $bffName }}
  labels:
    app: {{ $bffName }}
    component: bff
spec:
  replicas: {{ $bffConfig.replicaCount | default 1 }}
  selector:
    matchLabels:
      app: {{ $bffName }}
  template:
    metadata:
      labels:
        app: {{ $bffName }}
        component: bff
    spec:
      {{/* Secret pour GHCR */}}
      imagePullSecrets:
        - name: ghcr-secret
      
      {{/* Init Container : Attente de TOUTES les dépendances (Redis + APIs) */}}
      initContainers:
        - name: wait-for-dependencies
          image: busybox:1.28
          command: 
            - 'sh'
            - '-c'
            - >
              until nc -zv {{ $.Release.Name }}-redis 6379; do echo waiting for redis; sleep 2; done;
              until nc -zv {{ $.Release.Name }}-core-api 3000; do echo waiting for core-api; sleep 2; done;
              until nc -zv {{ $.Release.Name }}-project-api 3001; do echo waiting for project-api; sleep 2; done;
              until nc -zv {{ $.Release.Name }}-calendar-api 3002; do echo waiting for calendar-api; sleep 2; done;
              until nc -zv {{ $.Release.Name }}-message-api 3003; do echo waiting for message-api; sleep 2; done;
              until nc -zv {{ $.Release.Name }}-email-api 3004; do echo waiting for email-api; sleep 2; done;
              until nc -zv {{ $.Release.Name }}-files-api 3005; do echo waiting for files-api; sleep 2; done;
              until nc -zv {{ $.Release.Name }}-elearning-api 3006; do echo waiting for elearning-api; sleep 2; done;

      {{/* Container principal du BFF */}}
      containers:
        - name: {{ $bffName }}
          image: "{{ $bffConfig.image.repository }}:{{ $bffConfig.image.tag | default "latest" }}"
          ports:
            - containerPort: 4000
          env:
            {{- include "bffs.commonEnv" $ | nindent 12 }}
            {{- if $bffConfig.env }}
            {{- toYaml $bffConfig.env | nindent 12 }}
            {{- end }}
          resources:
            limits:
              memory: "512Mi"
            requests:
              memory: "256Mi"
          # Ajout d'une readinessProbe pour sécuriser le trafic
          readinessProbe:
            httpGet:
              path: /health # Ou ton endpoint de check
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
{{- end }}
{{- end }}