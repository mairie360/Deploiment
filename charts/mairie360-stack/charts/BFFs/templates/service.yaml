{{- range $bffName, $bffConfig := .Values.instances }}
{{- if $bffConfig.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $.Release.Name }}-{{ $bffName }}
  labels:
    app: {{ $bffName }}
    component: bff
spec:
  type: ClusterIP
  ports:
    - port: {{ if eq $bffName "bff-user" }}4000{{ else if eq $bffName "bff-project" }}4001{{ else if eq $bffName "bff-calendar" }}4002{{ else if eq $bffName "bff-message" }}4003{{ else if eq $bffName "bff-email" }}4004{{ else if eq $bffName "bff-files" }}4005{{ else if eq $bffName "bff-elearning" }}4006{{ else }}4000{{ end }}
      targetPort: 4000
      protocol: TCP
      name: http
  selector:
    app: {{ $bffName }}
{{- end }}
{{- end }}