{{- range $bffName, $bffConfig := .Values.instances }}
{{- if $bffConfig.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ $.Release.Name }}-{{ $bffName }}
  labels:
    app: {{ $bffName }}
    component: bff
spec:
  type: ClusterIP
  ports:
      - port: {{ $bffConfig.port | default 4000 }}
        targetPort: 4000
        protocol: TCP
        name: http
  selector:
    app: {{ $bffName }}
{{- end }}
{{- end }}
