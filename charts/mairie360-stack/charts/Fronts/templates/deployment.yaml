{{- range $frontName, $frontConfig := .Values.instances }}
{{- if $frontConfig.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $.Release.Name }}-{{ $frontName | lower }}
  labels:
    {{- include "fronts.labels" $ | nindent 4 }}
    app: {{ $frontName | lower }}
spec:
  replicas: {{ $frontConfig.replicaCount | default 1 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      {{- include "fronts.selectorLabels" $ | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fronts.labels" $ | nindent 8 }}
        app: {{ $frontName | lower }}
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      # L'initContainer a été supprimé pour éviter les deadlocks et corriger l'erreur de parsing
      containers: 
        - name: {{ $frontName | lower }}
          image: "{{ $frontConfig.image.repository }}:{{ $frontConfig.image.tag | default "latest" }}"
          ports:
            - containerPort: 3000
          env:
            {{- include "fronts.commonEnv" $ | nindent 12 }}
            {{- if $frontConfig.env }}
            {{- toYaml $frontConfig.env | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          {{- if $frontConfig.resources }}
          resources:
            {{- toYaml $frontConfig.resources | nindent 12 }}
          {{- else }}
          resources:
            limits:
              memory: "128Mi"
              cpu: "200m"
            requests:
              memory: "64Mi"
              cpu: "100m"
          {{- end }}
{{- end }}
{{- end }}