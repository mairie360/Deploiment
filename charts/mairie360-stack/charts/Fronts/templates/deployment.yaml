{{- range $frontName, $frontConfig := .Values.instances }}
{{- if $frontConfig.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $.Release.Name }}-{{ $frontName | lower }}
  labels:
    {{- include "fronts.labels" $ | nindent 4 }}
    app: {{ $frontName | lower }}
spec:
  replicas: {{ $frontConfig.replicaCount | default 1 }}
  selector:
    matchLabels:
      # --- CORRECTION ICI ---
      {{- include "fronts.selectorLabels" $ | nindent 6 }}
  template:
    metadata:
      labels:
        # --- ET ICI ---
        {{- include "fronts.labels" $ | nindent 8 }}
        app: {{ $frontName | lower }}
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      initContainers:
        - name: wait-for-bff
          image: busybox:1.28
          command: ['sh', '-c', {{ printf "until nc -zv %s-bff-user 4000; do echo waiting for bff; sleep 2; done;" $.Release.Name | quote }}]
      containers:
        - name: {{ $frontName | lower }}
          image: "{{ $frontConfig.image.repository }}:{{ $frontConfig.image.tag | default "latest" }}"
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            {{- include "fronts.commonEnv" $ | nindent 12 }}
            {{- if $frontConfig.env }}
            {{- toYaml $frontConfig.env | nindent 12 }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15 # Augmenté car Next.js peut être lent à démarrer
            periodSeconds: 10
{{- end }}
{{- end }}