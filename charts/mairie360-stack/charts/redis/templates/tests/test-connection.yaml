apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "redis.fullname" . }}-test-connection"
  labels:
    app: {{ include "redis.name" . }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: redis-test
      image: redis:7.2.0
      command:
        - sh
        - -c
        - |
          echo "🔍 Starting Redis connection test..."
          echo "Using host: {{ include "redis.fullname" . }}"
          COUNT=0
          until redis-cli -h {{ include "redis.fullname" . }} ping > /dev/null 2>&1; do
            COUNT=$((COUNT+1))
            echo "⏳ Waiting for Redis to be ready... ($COUNT)"
            sleep 2
            if [ $COUNT -gt 30 ]; then
              echo "❌ Redis did not become ready in time!"
              exit 1
            fi
          done
          echo "✅ Redis is reachable!"
