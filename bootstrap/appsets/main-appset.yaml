# bootstrap/appsets/main-appset.yaml
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: local-environments
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - env: dev
          - env: staging
          - env: prod
  template:
    metadata:
      name: 'local-{{env}}'
    spec:
      source:
        repoURL: 'https://github.com/mairie360/Deploiment.git'
        targetRevision: mair-23/set-up-db-deployment # <--- CHANGE CECI
        path: 'clusters/local/{{env}}'
        helm:
          parameters:
            - name: "image.pullSecretData"
              # Commande pour générer cette valeur :
              # cat ~/.docker/config.json | base64 -w 0
              value: "eyJhdXRocyI6eyJnaGNyLmlvIjp7ImF1dGgiOiJVWFZsYm5ScGJuUnVjbXc2WjJod1gwOUVjVUV5YzJ0dlIwY3diR001UjBSd1VHOUtUV1pGY1VWUVUwZ3pNak4zVHpkS1FnPT0ifX19"
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{env}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
