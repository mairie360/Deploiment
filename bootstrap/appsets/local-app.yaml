apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: local-environments
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: 'https://github.com/mairie360/Deploiment.git'
        revision: mair-47-add-missing-services
        directories:
          - path: clusters/local/*
          - path: clusters/local/staging
            exclude: true
          - path: clusters/local/prod
            exclude: true
  template: # <--- BIEN ALIGNÉ SOUS "spec" (2 espaces)
    metadata:
      name: 'local-{{path.basename}}'
    spec:
      project: default
      source:
        repoURL: 'https://github.com/mairie360/Deploiment.git'
        targetRevision: mair-47-add-missing-services
        path: charts/mairie360-stack 
        helm:
          valueFiles:
            - "../../{{path}}/values.yaml"
      destination:
        server: https://kubernetes.default.svc
        namespace: 'mairie360-{{path.basename}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true