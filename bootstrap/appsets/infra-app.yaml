apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-configs
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: 'https://github.com/mairie360/Deploiment.git'
      targetRevision: mair-23/set-up-db-deployment
      path: bootstrap/appsets
      directory:
        recurse: true
    
    - repoURL: 'https://github.com/mairie360/Deploiment.git'
      targetRevision: mair-23/set-up-db-deployment
      path: configs

    - repoURL: 'https://charts.jetstack.io'
      chart: cert-manager
      targetRevision: v1.13.3
      helm:
        releaseName: cert-manager
        values: |
          installCRDs: true
          # Fix pour le self-check HTTP-01 en environnement contraint
          hostAliases:
            - ip: "51.158.96.108"
              hostnames:
                - "dev.mairie360-eip.fr"
                - "staging.mairie360-eip.fr"
                - "prod.mairie360-eip.fr"
          # On garde ça par sécurité pour les futures validations DNS
          extraArgs:
            - --dns01-recursive-nameservers-only
            - --dns01-recursive-nameservers=8.8.8.8:53,1.1.1.1:53
  
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager # Conseil : Déploie cert-manager dans son propre namespace
    
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true