apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-configs
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: 'https://github.com/mairie360/Deploiment.git'
      targetRevision: mair-30-add-apis-in-helm-config
      path: bootstrap/appsets
      directory:
        recurse: true
    - repoURL: 'https://github.com/mairie360/Deploiment.git'
      targetRevision: mair-30-add-apis-in-helm-config
      path: configs
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd 
  syncPolicy:
    automated:
      prune: true
      selfHeal: true