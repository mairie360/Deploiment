apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-configs
  namespace: argocd
spec:
  project: default
  sources:
    # 1. Tes manifests existants dans bootstrap/appsets
    - repoURL: 'https://github.com/mairie360/Deploiment.git'
      targetRevision: mair-23/set-up-db-deployment
      path: bootstrap/appsets
      directory:
        recurse: true
    
    # 2. Tes configs (Portainer, RBAC, etc.)
    - repoURL: 'https://github.com/mairie360/Deploiment.git'
      targetRevision: mair-23/set-up-db-deployment
      path: configs

    # 3. AJOUT : Installation de Cert-Manager avec le fix DNS
    - repoURL: 'https://charts.jetstack.io'
      chart: cert-manager
      targetRevision: v1.13.3
      helm:
        releaseName: cert-manager
        values: |
          installCRDs: true
          extraArgs:
            - --dns01-recursive-nameservers-only
            - --dns01-recursive-nameservers=8.8.8.8:53,1.1.1.1:53
  
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd 
    
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true