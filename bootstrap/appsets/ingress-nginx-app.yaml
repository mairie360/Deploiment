apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://kubernetes.github.io/ingress-nginx'
    chart: ingress-nginx
    # Récupère la dernière version stable du chart Helm officiel
    targetRevision: '*'
    helm:
      releaseName: ingress-nginx
      values: |
        controller:
          # C'est ici que l'on applique la tolérance de façon permanente !
          tolerations:
            - key: "node-role.kubernetes.io/control-plane"
              operator: "Exists"
              effect: "NoSchedule"
            - key: "node-role.kubernetes.io/master"
              operator: "Exists"
              effect: "NoSchedule"
          # Configuration recommandée pour que l'Ingress expose bien les ports sur un cluster Kind local
          hostPort:
            enabled: true
          service:
            type: NodePort
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
