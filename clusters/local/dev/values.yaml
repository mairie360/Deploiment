mairie360-stack:
  # 1. Image & Global
  image:
    pullSecretData: "eyJhdXRocyI6eyJnaGNyLmlvIjp7ImF1dGgiOiJVWFZsYm5ScGJuUnVjbXc2WjJod1gwOUVjVUV5YzJ0dlIwY3diR001UjBSd1VHOUtUV1pGY1VWUVUwZ3pNak4zVHpkS1FnPT0ifX19"
    repository: ghcr.io/mairie360/core
    tag: "latest"

  # 2. Ingress (Pour corriger ta nouvelle erreur)
  ingress:
    enabled: false  # On le désactive pour le dev local, mais la clé existe enfin !

  # 3. Service
  service:
    type: ClusterIP
    port: 80

  # 4. Database
  database:
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
    persistence:
      size: "1Gi"
    env:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "mysecretpassword"
      POSTGRES_DB: "mairie_db_dev"

  # 5. Liquibase (L'aiguillage pour le Job)
  liquibase:
    image:
      tag: "dev-latest"
    db:
      host: "local-dev-database"
      port: 5432
      name: "mairie_db_dev"
    secretName: "local-dev-database-secret"

  # 6. Redis
  redis:
    enabled: true