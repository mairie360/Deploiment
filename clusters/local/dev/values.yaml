mairie360-stack:
  # 1. Image & Global
  image:
    pullSecretData: "eyJhdXRocyI6eyJnaGNyLmlvIjp7ImF1dGgiOiJVWFZsYm5ScGJuUnVjbXc2WjJod1gwOUVjVUV5YzJ0dlIwY3diR001UjBSd1VHOUtUV1pGY1VWUVUwZ3pNak4zVHpkS1FnPT0ifX19"
    repository: ghcr.io/mairie360/core
    tag: "latest"

  # 2. Ingress
  ingress:
    enabled: true
    className: "nginx"
    clusterIssuer: "letsencrypt-local"
    annotations:
      # --- FIX POUR LET'S ENCRYPT ---
      # Autorise le HTTP sur le port 80 pour que le challenge ACME passe
      kubernetes.io/ingress.allow-http: "true"
      # Désactive la redirection SSL forcée par Nginx le temps de la validation
      nginx.ingress.kubernetes.io/ssl-redirect: "false"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
      # Sécurité et compatibilité
      nginx.ingress.kubernetes.io/whitelist-source-range: "0.0.0.0/0"
    hosts:
      - host: dev.mairie360-eip.fr
        paths:
          - path: /
            pathType: ImplementationSpecific
            serviceName: "local-dev-mairie360-stack-gateway"
            servicePort: 80
    tls:
      - secretName: dev-mairie360-tls
        hosts:
          - dev.mairie360-eip.fr

  # 3. Service
  service:
    type: ClusterIP
    port: 80

  # 4. Database
  database:
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
    persistence:
      size: "1Gi"
      storageClass: "local-path"
    env:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "mysecretpassword"
      POSTGRES_DB: "mairie_db_dev"

  # 5. Liquibase
  liquibase:
    image:
      tag: "dev-latest"
    db:
      host: "local-dev-database"
      port: 5432
      name: "mairie_db_dev"
    secretName: "local-dev-database-secret"

  # 6. Redis
  redis:
    enabled: true