mairie360-stack:
  # 1. Image & Global
  image:
    pullSecretData: "eyJhdXRocyI6eyJnaGNyLmlvIjp7ImF1dGgiOiJVWFZsYm5ScGJuUnVjbXc2WjJod1gwOUVjVUV5YzJ0dlIwY3diR001UjBSd1VHOUtUV1pGY1VWUVUwZ3pNak4zVHpkS1FnPT0ifX19"
    repository: ghcr.io/mairie360/core
    tag: "latest"

  # 2. Ingress (Configuré pour HTTPS)
  ingress:
    enabled: true
    className: "nginx"
    annotations:
      # On force la redirection HTTP vers HTTPS
      kubernetes.io/ingress.allow-http: "false"
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      # Si tu utilises cert-manager pour générer tes certificats automatiquement :
      # cert-manager.io/cluster-issuer: "letsencrypt-prod"
    hosts:
      - host: dev.mairie360-eip.fr
        paths:
          - path: /
            pathType: ImplementationSpecific
            serviceName: "mairie360-gateway"
            servicePort: 80 # Le service interne reste souvent en 80, c'est l'Ingress qui gère le TLS
    tls:
      - secretName: argocd-server-tls # Le nom du certificat (doit exister dans le namespace)
        hosts:
          - dev.mairie360-eip.fr

  # 3. Service
  service:
    type: ClusterIP
    port: 80

  # 4. Database
  database:
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
    persistence:
      size: "1Gi"
      storageClass: "local-path"
    env:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "mysecretpassword"
      POSTGRES_DB: "mairie_db_dev"

  # 5. Liquibase
  liquibase:
    image:
      tag: "dev-latest"
    db:
      host: "local-dev-database"
      port: 5432
      name: "mairie_db_dev"
    secretName: "local-dev-database-secret"

  # 6. Redis
  redis:
    enabled: true