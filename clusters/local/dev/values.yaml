# 1. Image & Global
image:
  pullSecretData: "eyJhdXRocyI6eyJnaGNyLmlvIjp7ImF1dGgiOiJVWFZsYm5ScGJuUnVjbXc2WjJod1gwOUVjVUV5YzJ0dlIwY3diR001UjBSd1VHOUtUV1pGY1VWUVUwZ3pNak4zVHpkS1FnPT0ifX19"
  repository: ghcr.io/mairie360/core
  tag: "latest"

# 2. Global
global:
  domain: "dev.mairie360-eip.fr"
  # Configuration des BFFs (ce que vous avez probablement déjà fait)

  database:
    type: "postgres"
    host: "mairie360-database" # Nom du service Kubernetes
    port: 5432
    name: "mairie_db_dev"
    user: "postgres" # Si vous utilisez des secrets, voir note ci-dessous
    secretName: "local-dev-database-secret"

  redis:
    host: "mairie360-redis"
    port: 6379
    url: "redis://mairie360-redis:6379"

  bffs:
    instances:
      user-bff: { port: 4000 }
      project-bff: { port: 4001 }
      calendar-bff: { port: 4002 }
      message-bff: { port: 4003 }
      email-bff: { port: 4004 }
      files-bff: { port: 4005 }
      elearning-bff: { port: 4006 }

  # Ajoutez ce bloc pour les APIs :
  apis:
    instances:
      core-api: { port: 3000 }
      project-api: { port: 3001 }
      calendar-api: { port: 3002 }
      message-api: { port: 3003 }
      email-api: { port: 3004 }
      files-api: { port: 3005 }
      elearning-api: { port: 3006 }

# 3. Ingress
ingress:
  enabled: true
  className: "nginx"
  clusterIssuer: "letsencrypt-local"
  annotations:
    # --- FIX POUR LET'S ENCRYPT ---
    # Autorise le HTTP sur le port 80 pour que le challenge ACME passe
    kubernetes.io/ingress.allow-http: "true"
    # Désactive la redirection SSL forcée par Nginx le temps de la validation
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
    # Sécurité et compatibilité
    nginx.ingress.kubernetes.io/whitelist-source-range: "0.0.0.0/0"
  hosts:
    - host: dev.mairie360-eip.fr
      paths:
        - path: /
          pathType: ImplementationSpecific
          serviceName: "local-dev-fronts"
          servicePort: 80
  tls:
    - secretName: dev-mairie360-tls
      hosts:
        - dev.mairie360-eip.fr

# 4. Service
service:
  type: ClusterIP
  port: 80

# 5. Database
database:
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
  persistence:
    size: "1Gi"
    storageClass: "local-path"
  env:
    POSTGRES_USER: "postgres"
    POSTGRES_PASSWORD: "mysecretpassword"
    POSTGRES_DB: "mairie_db_dev"

# 6. Liquibase
liquibase:
  image:
    tag: "dev-latest"
  db:
    host: "local-dev-database"
    port: 5432
    name: "mairie_db_dev"
  secretName: "local-dev-database-secret"

# 7. Redis
redis:
  enabled: true

