mairie360-stack:
  # 1. Image & Secret (Ton bloc actuel)
  image:
    pullSecretData: "eyJhdXRocyI6eyJnaGNyLmlvIjp7ImF1dGgiOiJVWFZsYm5ScGJuUnVjbXc2WjJod1gwOUVjVUV5YzJ0dlIwY3diR001UjBSd1VHOUtUV1pGY1VWUVUwZ3pNak4zVHpkS1FnPT0ifX19"
    repository: ghcr.io/mairie360/core # Assure-toi que c'est le bon chemin
    tag: "latest"

  # 2. Database : Tes réglages spécifiques pour le dev
  database:
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
    persistence:
      size: "1Gi"
    env:
      POSTGRES_DB: "mairie_dev"
      POSTGRES_USER: "dev_user"
      POSTGRES_PASSWORD: "dev_password"
      POSTGRES_HOST: "mairie_db"

  # 3. Service : Ajouté pour corriger l'erreur "nil pointer evaluating interface {}.type"
  service:
    type: ClusterIP
    port: 80

  # 4. Redis : On l'active par défaut ou on met un bloc vide pour éviter les erreurs de template
  redis:
    enabled: true
    persistence:
      size: "500Mi"