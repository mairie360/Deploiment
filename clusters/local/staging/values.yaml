mairie360-stack:
  # 1. Image
  image:
    pullSecretData: "eyJhdXRocyI6eyJnaGNyLmlvIjp7ImF1dGgiOiJVWFZsYm5ScGJuUnVjbXc2WjJod1gwOUVjVUV5YzJ0dlIwY3diR001UjBSd1VHOUtUV1pGY1VWUVUwZ3pNak4zVHpkS1FnPT0ifX19"
    repository: ghcr.io/mairie360/core
    tag: "latest" # Ou un tag spécifique type 'staging'

  # 2. Ingress (Activé ici pour tester l'accès externe)
  ingress:
    enabled: true
    hosts:
      - host: staging.mairie360.local # À adapter à ton DNS
        paths:
          - path: /
            pathType: ImplementationSpecific

  # 4. Database (Specs intermédiaires)
  database:
    resources:
      requests:
        memory: "512Mi"
        cpu: "500m"
    persistence:
      size: "2Gi"
    env:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "stagingpassword123" # Mot de passe différent du dev !
      POSTGRES_DB: "mairie_db_staging"

  # 5. Liquibase
  liquibase:
    image:
      tag: "latest"
    db:
      host: "local-staging-database" # Le nom dépend du nom du release Argo Staging
      port: 5432
      name: "mairie_db_staging"
    secretName: "local-staging-database-secret"

  # 6. Redis
  redis:
    enabled: true