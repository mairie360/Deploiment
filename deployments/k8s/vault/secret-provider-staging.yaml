apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: vault-database-staging
  namespace: staging
spec:
  provider: vault
  secretObjects:
  - secretName: shared-db-coreAPI-staging
    type: Opaque
    data:
      - objectName: DB_HOST
        key: DB_HOST
      - objectName: DB_PORT
        key: DB_PORT
      - objectName: DB_USER
        key: DB_USER
      - objectName: DB_PASSWORD
        key: DB_PASSWORD
      - objectName: DB_NAME
        key: DB_NAME
  parameters:
    roleName: "database-staging"
    vaultAddress: "https://vault.example.com"
    objects: |
      - objectName: "DB_HOST"
        secretPath: "secret/mairie360/shared-db-coreAPI/staging"
        secretKey: "DB_HOST"
      - objectName: "DB_PORT"
        secretPath: "secret/mairie360/shared-db-coreAPI/staging"
        secretKey: "DB_PORT"
      - objectName: "DB_USER"
        secretPath: "secret/mairie360/shared-db-coreAPI/staging"
        secretKey: "DB_USER"
      - objectName: "DB_PASSWORD"
        secretPath: "secret/mairie360/shared-db-coreAPI/staging"
        secretKey: "DB_PASSWORD"
      - objectName: "DB_NAME"
        secretPath: "secret/mairie360/shared-db-coreAPI/staging"
        secretKey: "DB_NAME"
