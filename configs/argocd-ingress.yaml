apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server-ingress
  namespace: argocd
  annotations:
    kubernetes.io/ingress.class: nginx
    # Indique à Nginx que le service derrière (Argo) parle en HTTPS
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    # Augmente la taille max des uploads (utile pour certaines configs Argo)
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
spec:
  ingressClassName: nginx
  rules:
  - host: argo.mairie360.fr
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: argocd-server
            port:
              number: 443