apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server-ingress
  namespace: argocd
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    
    # --- CONFIGURATION STABLE ---
    # On force le SSL pour éviter les boucles de redirection avec le pod Argo
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    
    # On dit à Nginx que le pod Argo parle HTTPS en interne
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    
    # Recommandé pour ArgoCD : laisse passer le flux sans altération
    nginx.ingress.kubernetes.io/ssl-passthrough: "true"
    
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-ssl-verify: "off"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - argocd.mairie360-eip.fr
    secretName: argocd-server-tls
  rules:
  - host: argocd.mairie360-eip.fr
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: argocd-server
            port:
              number: 443