name: Helm CI/CD

on:
  push:
  pull_request:

jobs:
  helm-ci:
    name: Lint, Deploy & Test Helm Chart
    runs-on: ubuntu-latest

    steps:
      # --- Étape 1 : Récupération du code ---
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- Étape 2 : Installation d’Helm ---
      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.0

      # --- Étape 3 : Démarrage d’un cluster Kubernetes éphémère ---
      - name: Start Minikube
        uses: medyagh/setup-minikube@latest
        with:
          driver: docker
          memory: 4g
          cpus: 2

      # --- Étape 4 : Lint du chart ---
      - name: Helm lint
        run: |
          helm lint ./mairie360

      # --- Étape 5 : Build des dépendances ---
      - name: Helm dependencies
        run: |
          helm dependency build ./mairie360

      # --- Étape 6 : Déploiement sur le cluster ---
      - name: Deploy Helm chart
        run: |
          helm upgrade --install mairie360 ./mairie360 \
            -f ./mairie360/values-dev.yaml \
            -n dev --create-namespace

      # --- Étape 7 : Attente du démarrage complet ---
      - name: Wait for pods to be ready
        run: |
          kubectl wait --for=condition=Ready pod -l app.kubernetes.io/instance=mairie360 -n dev --timeout=120s

      # --- Étape 8 : Exécution des tests Helm ---
      - name: Run Helm tests
        run: |
          helm test mairie360 -n dev

      # --- Étape 9 : Nettoyage ---
      - name: Cleanup
        if: always()
        run: |
          helm uninstall mairie360 -n dev || true
          kubectl delete namespace dev || true
