name: Helm CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:

jobs:
  # ================================
  # 🧱 JOB 1 : Validation & Qualité
  # ================================
  helm-validation:
    name: Lint & Template Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.0

      - name: Helm lint (Recursive)
        run: |
          # Lint du chart principal et des subcharts
          helm lint ./charts/mairie360-stack
          find ./charts/mairie360-stack/charts -maxdepth 1 -type d -exec helm lint {} \;

      - name: Helm dependency build
        run: helm dependency build ./charts/mairie360-stack

      # ✨ LE TEST CRUCIAL : Simulation de rendu pour chaque env
      - name: Validate Template Rendering (Dry-Run)
        run: |
          for env in dev staging prod; do
            echo "Testing rendering for $env"
            helm template test ./charts/mairie360-stack \
              -f ./clusters/local/$env/values.yaml > dry-run-$env.yaml
          done

