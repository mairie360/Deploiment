apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-image-updater-config
  namespace: argocd
data:
  registries.conf: |
    registries:
    - name: GitHub Container Registry
      api_url: https://ghcr.io
      prefix: ghcr.io
      # On pointe vers le secret que le script vient de créer
      credentials: pullsecret:argocd/github-org-creds
      # On précise que c'est une GitHub App pour qu'il génère le token dynamiquement
      credsexpiration: 1h