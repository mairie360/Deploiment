apiVersion: v1
kind: Secret
metadata:
  # The name matches what the StatefulSet expects
  name: {{ include "database.fullname" . }}-secret
  labels:
    app: {{ include "database.name" . }}
type: Opaque
data:
  # Values are pulled from values.yaml and encoded to Base64
  POSTGRES_USER: {{ .Values.env.POSTGRES_USER | b64enc | quote }}
  POSTGRES_PASSWORD: {{ .Values.env.POSTGRES_PASSWORD | b64enc | quote }}
  POSTGRES_DB: {{ .Values.env.POSTGRES_DB | b64enc | quote }}